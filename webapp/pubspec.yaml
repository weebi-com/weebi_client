name: web_admin
description: Weebi Web Admin
publish_to: 'none'
version: 1.0.5

environment:
  sdk: '>=3.3.3 <4.0.0'

# avoid risking `flutter pub upgrade --major-versions`
# prefer `flutter pub outdated`
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any #^0.19.0

  grpc: ^4.0.1 # grpc_web not exported from protos_weebi
  protos_weebi: ^1.3.2
  models_weebi: any
  auth_weebi: ^1.0.7
  boutiques_weebi: ^1.1.2
    #path: ../weebi/packages/boutiques
  users_weebi: ^1.0.9
    # path: ../weebi/packages/users
  accesses_weebi: ^1.0.7
  devices_weebi: ^1.0.7
  gatekeeper_weebi: ^1.0.7
  design_weebi: ^0.1.3
  charts_weebi:
    path: ../packages/charts_weebi


  shared_preferences: ^2.2.2
  provider: ^6.1.2
  go_router: ^13.2.0
  google_fonts: ^6.3.2
  pointer_interceptor: ^0.10.1
  flutter_form_builder: any #^10.3.0+2
  form_builder_validators: ^11.1.2
  awesome_dialog: ^3.2.0
  file_picker: ^8.0.0

  http: ^1.2.0

  package_info_plus: ^8.3.1



  flutter_markdown: ^0.7.7+1
  aptabase_flutter: ^0.4.1
  currency_picker: ^2.0.21

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^3.0.0

dependency_overrides:
  # rive_native 0.1.6 references Flutter semantics APIs that are not present in
  # the Docker image's pinned Flutter SDK.
  rive_native: 0.1.4


flutter:

  uses-material-design: true

  assets:
    - assets/images/app_logo.png
    - lib/cgv_en.md
    - lib/cgv_fr.md

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_intl:
  enabled: true
  class_name: Lang
  main_locale: en
