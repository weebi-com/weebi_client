server {
    listen __PORT__;
    server_name _;

    gzip on;
    gzip_types application/json text/css text/javascript application/javascript application/wasm image/svg+xml;

    # config.json is written by entrypoint.sh from Cloud Run env (API_URL, LOCALE).
    # No caching so the app always gets current values; correct type for fetch().
    location = /config.json {
        root /usr/share/nginx/html;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Browsers often request /favicon.ico before HTML; without this, try_files serves index.html (wrong MIME).
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.png;
        default_type image/png;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}