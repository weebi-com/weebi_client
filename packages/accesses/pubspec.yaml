name: accesses_weebi
description: "User access management package for Weebi - allows admins to manage user permissions and access to boutiques/chains"
version: 1.0.7
homepage: https://weebi.com

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.1"

dependencies:
  flutter:
    sdk: flutter
  ###
  # weebi's kitchen below
  protos_weebi: ^1.2.6 # License types; align with users_weebi
  users_weebi: ^1.0.9
  boutiques_weebi: ^1.1.0
  
  provider: ^6.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.8.0